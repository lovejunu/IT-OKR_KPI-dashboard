<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔키아 OKR·KPI 대시보드</title>
<style>
:root{
  --bg:#0a0f2e;--panel:#111936;--panel2:#172045;--line:#1e2d5c;
  --txt:#e2e8f8;--muted:#7a89b8;--head:#1a2660;
  --accent:#4f8ef7;--teal:#00c9b1;
  --lead:#22c55e;--lag:#64748b;
  --q:#3b82f6;--s:#a855f7;--c:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;font-size:14px;min-height:100vh}

/* ── Header ── */
header{background:linear-gradient(135deg,#050c28 0%,#0d1f6e 55%,#1a3a6e 100%);
  padding:14px 20px;position:sticky;top:0;z-index:20;box-shadow:0 2px 20px rgba(0,0,0,.7)}
.htop{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;max-width:1200px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--teal));
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff;flex-shrink:0}
h1{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
h1 span{font-weight:400;color:#9eb3e8;font-size:11px;display:block;margin-top:2px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--teal);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.updated{font-size:11px;color:#9eb3e8}

/* ── Wrap & Tabs ── */
.wrap{max-width:1200px;margin:0 auto;padding:12px 14px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 0 4px;position:sticky;top:62px;background:var(--bg);z-index:15;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:8px 20px;
  border-radius:20px;cursor:pointer;white-space:nowrap;font-size:13px;font-weight:500;transition:.15s;user-select:none}
.tab:hover{background:var(--panel2);color:var(--txt)}
.tab[data-tab="영업"].active{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:700}
.tab[data-tab="연구소"].active{background:#7c3aed;border-color:#7c3aed;color:#fff;font-weight:700}
.tab[data-tab="사업수행"].active{background:#0f766e;border-color:#0f766e;color:#fff;font-weight:700}
.tab-content{display:none}.tab-content.active{display:block}

/* ── Job Header ── */
.job-header{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.job-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0}
.job-title{font-size:15px;font-weight:700}
.job-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5}

/* ── Stats Row ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 10px;text-align:center}
.stat-val{font-size:20px;font-weight:800;letter-spacing:-.5px}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.3}

/* ── Section Label ── */
.sec-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;
  text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--line)}

/* ── OKR Grid ── */
.okr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.okr-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.okr-head{padding:11px 13px;display:flex;align-items:flex-start;gap:9px;border-bottom:1px solid var(--line);
  cursor:pointer;transition:background .15s;position:relative}
.okr-head:hover{background:rgba(255,255,255,.025)}
.okr-head:hover .scroll-hint{opacity:1;color:var(--accent)}
.scroll-hint{font-size:9px;color:var(--muted);opacity:.4;flex-shrink:0;margin-left:auto;padding-top:2px;
  transition:opacity .2s,color .2s;white-space:nowrap}
.o-badge{min-width:28px;height:28px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px}
.okr-title{font-size:12px;font-weight:700;line-height:1.45;color:var(--txt);flex:1}
.okr-note{font-size:10.5px;color:var(--muted);padding:7px 13px;border-bottom:1px solid var(--line);
  font-style:italic;line-height:1.55;background:rgba(255,255,255,.015)}
.kr-list{padding:4px 0;flex:1}

/* ── KR Accordion ── */
.kr-wrap{border-bottom:1px solid rgba(30,45,92,.7)}
.kr-wrap:last-child{border-bottom:none}
.kr-row{display:flex;align-items:flex-start;gap:7px;padding:6px 13px;cursor:pointer;transition:background .15s}
.kr-row:hover{background:rgba(255,255,255,.025)}
.kr-wrap.kr-open .kr-row{background:rgba(79,142,247,.04)}
.kr-num{font-size:9.5px;font-weight:700;color:var(--muted);flex-shrink:0;padding-top:2px;min-width:22px}
.kr-content{flex:1;min-width:0}
.kr-text{font-size:11.5px;line-height:1.4;color:var(--txt)}
.kr-meta{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.target{background:rgba(79,142,247,.13);color:#7eb3ff;border:1px solid rgba(79,142,247,.28);
  border-radius:4px;padding:1px 6px;font-size:9.5px;font-weight:700}
.kr-toggle{font-size:10px;color:var(--muted);flex-shrink:0;padding-top:3px;opacity:.5;
  transition:transform .25s,opacity .2s;user-select:none}
.kr-wrap.kr-open .kr-toggle{transform:rotate(180deg);opacity:1;color:var(--accent)}
.kr-accordion{max-height:0;overflow:hidden;transition:max-height .3s ease}
.kr-wrap.kr-open .kr-accordion{max-height:220px}
.kr-formula-box{margin:0 13px 8px 42px;background:rgba(79,142,247,.07);
  border-left:2px solid var(--accent);border-radius:0 5px 5px 0;padding:7px 10px}
.kr-formula-title{font-size:9px;color:var(--accent);font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:3px}
.kr-formula-text{font-size:10.5px;color:#8fa4d4;line-height:1.55;font-family:"Courier New",monospace}
.kr-bench-box{margin:0 13px 8px 42px;background:rgba(0,201,177,.06);
  border-left:2px solid var(--teal);border-radius:0 5px 5px 0;padding:7px 10px}
.kr-bench-title{font-size:9px;color:var(--teal);font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:3px}
.kr-bench-text{font-size:10.5px;color:#7abfb8;line-height:1.5;font-style:italic}

/* ── Badges ── */
.badge{border-radius:4px;padding:1px 5px;font-size:9.5px;font-weight:700;white-space:nowrap}
.b-lead{background:rgba(34,197,94,.14);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.b-lag{background:rgba(100,116,139,.18);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}
.b-q{background:rgba(59,130,246,.14);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.b-s{background:rgba(168,85,247,.14);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
.b-c{background:rgba(249,115,22,.14);color:#fb923c;border:1px solid rgba(249,115,22,.25)}

/* ── [F4] Progress Section ── */
.progress-section{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  overflow:hidden;margin-bottom:12px}
.progress-header{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;
  user-select:none;font-size:12px;font-weight:700;transition:background .15s}
.progress-header:hover{background:rgba(255,255,255,.02)}
.progress-overall-pct{font-size:16px;font-weight:800;color:var(--accent);margin-left:4px}
.progress-toggle-icon{margin-left:auto;color:var(--muted);font-size:11px;transition:transform .25s}
.progress-section.open .progress-toggle-icon{transform:rotate(180deg)}
.progress-content{max-height:0;overflow:hidden;transition:max-height .35s ease}
.progress-section.open .progress-content{max-height:180px}
.progress-bar-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin:2px 14px 10px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));
  border-radius:3px;transition:width .4s ease;width:0%}
.progress-inputs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 14px 12px}
.prog-item{display:flex;flex-direction:column;gap:4px}
.prog-label{font-size:10px;color:var(--muted);font-weight:700}
.prog-input-row{display:flex;align-items:center;gap:4px}
.prog-input-row input{background:var(--bg);border:1px solid var(--line);border-radius:6px;
  color:var(--txt);font-size:13px;font-weight:700;width:52px;padding:4px 6px;text-align:center}
.prog-input-row input:focus{outline:none;border-color:var(--accent)}
.prog-input-row span{font-size:11px;color:var(--muted)}
.prog-mini-bar{height:3px;border-radius:2px;background:var(--line);overflow:hidden;margin-top:3px}
.prog-mini-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));
  border-radius:2px;transition:width .3s;width:0%}

/* ── [F5] KPI Filter Bar ── */
.kpi-filter-bar{display:flex;gap:6px;padding:10px 14px 6px;flex-wrap:wrap;
  border-bottom:1px solid var(--line)}
.kpi-filter-btn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
  padding:4px 13px;border-radius:14px;cursor:pointer;font-size:11px;font-weight:500;
  transition:.15s;white-space:nowrap}
.kpi-filter-btn:hover{border-color:var(--accent);color:var(--txt)}
.kpi-filter-btn.active[data-filter="all"]{border-color:var(--accent);color:var(--accent);
  background:rgba(79,142,247,.12);font-weight:700}
.kpi-filter-btn.active[data-filter="q"]{border-color:#3b82f6;color:#60a5fa;
  background:rgba(59,130,246,.12);font-weight:700}
.kpi-filter-btn.active[data-filter="s"]{border-color:#a855f7;color:#c084fc;
  background:rgba(168,85,247,.12);font-weight:700}
.kpi-filter-btn.active[data-filter="c"]{border-color:#f97316;color:#fb923c;
  background:rgba(249,115,22,.12);font-weight:700}
.kpi-row-hidden{display:none!important}

/* ── KPI Table Card ── */
.card-tbl{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px}
.card-tbl-head{background:var(--head);padding:10px 14px;font-size:12px;font-weight:700;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:520px}
th{background:var(--panel2);color:var(--muted);font-size:10.5px;font-weight:600;padding:8px 12px;
  text-align:left;white-space:nowrap}
th:not(:first-child){text-align:center}
td{padding:8px 12px;border-top:1px solid var(--line);font-size:11.5px;vertical-align:middle}
td:not(:first-child){text-align:center}
td:first-child{color:#cdd3e3;font-weight:500}
.r-lead td{background:rgba(34,197,94,.03)}
.cycle{background:var(--panel2);color:var(--muted);border-radius:4px;padding:1px 6px;font-size:10px}
.kpi-row-clickable{cursor:pointer;transition:background .12s}
.kpi-row-clickable:hover td{background:rgba(79,142,247,.07)!important}
.kpi-hint{display:inline-block;margin-left:6px;font-size:9px;color:var(--muted);opacity:.5}
.card-tbl-head .hint-txt{font-size:10px;color:var(--muted);font-weight:400;margin-left:4px}

/* ── Legend ── */
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:9px 14px 10px;border-top:1px solid var(--line);background:rgba(255,255,255,.01)}
.lg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}

/* ── Challenges ── */
.card-ch{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:14px}
.card-ch-head{background:var(--head);padding:10px 14px;font-size:12px;font-weight:700;border-bottom:1px solid var(--line)}
.ch-list{padding:6px 0}
.ch-item{display:flex;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line)}
.ch-item:last-child{border-bottom:none}
.ch-icon{font-size:15px;flex-shrink:0;line-height:1.4}
.ch-title{font-size:12px;font-weight:700;color:var(--txt)}
.ch-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5}

/* ── [F3] Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(5,10,35,.88);backdrop-filter:blur(5px);
  z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.modal-hd{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
.modal-title{font-size:13px;font-weight:700;line-height:1.4;flex:1}
.modal-close-btn{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--txt);
  border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.modal-close-btn:hover{background:rgba(255,255,255,.18)}
.modal-bd{padding:14px 16px;display:flex;flex-direction:column;gap:11px}
.modal-badges-row{display:flex;gap:6px;flex-wrap:wrap}
.modal-sec-title{font-size:9px;color:var(--accent);font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:5px}
.modal-sec-body{font-size:11.5px;line-height:1.6;background:rgba(255,255,255,.03);
  border-radius:6px;padding:8px 10px;border-left:2px solid var(--accent)}
.modal-sec-body.bench{border-left-color:var(--teal);color:#9abfb8}
.modal-sec-body.howto{border-left-color:#a855f7;color:#c4b5fd}

/* ── Footer ── */
footer{text-align:center;color:var(--muted);font-size:11px;padding:20px}

/* ── Responsive ── */
@media(max-width:700px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .okr-grid{grid-template-columns:1fr}
  .progress-inputs{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:420px){
  h1{font-size:14px}
  .stat-val{font-size:18px}
  td,th{padding:7px 8px}
}
</style>
</head>

<div class="wrap">

  }
};

/* ── Constants ── */
const KT_LABEL={q:'정량',s:'정성',c:'보완'};
const KT_CLASS={q:'b-q',s:'b-s',c:'b-c'};
const TP_LABEL={lead:'선행(Leading)',lag:'후행(Lagging)'};
const TP_CLASS={lead:'b-lead',lag:'b-lag'};

/* ── Global state ── */
const PROGRESS = {
  영업:{O1:0,O2:0,O3:0,O4:0},
  연구소:{O1:0,O2:0,O3:0,O4:0},
  사업수행:{O1:0,O2:0,O3:0,O4:0}
};
const FILTER = {영업:'all',연구소:'all',사업수행:'all'};

/* ── Helpers ── */
function badge(cls,txt){return `<span class="badge ${cls}">${txt}</span>`}

/* ── [F4] Progress HTML ── */
function renderProgress(key){
  const pr = PROGRESS[key];
  const avg = Math.round((pr.O1+pr.O2+pr.O3+pr.O4)/4);
  const okrs = DATA[key].okrs;
  const inputs = ['O1','O2','O3','O4'].map((ok,i)=>`
    <div class="prog-item">
      <div class="prog-label">${ok} — ${okrs[i].id}</div>
      <div class="prog-input-row">
        <input type="number" min="0" max="100" value="${pr[ok]}" data-ok="${ok}" class="progress-input">
        <span>%</span>
      </div>
      <div class="prog-mini-bar"><div class="prog-mini-fill" style="width:${pr[ok]}%"></div></div>
    </div>`).join('');
  return `
  <div class="progress-section" id="progress-section">
    <div class="progress-header" id="progress-header">
      🎯 분기 OKR 달성률 트래커
      <span class="progress-overall-pct" id="progress-pct">${avg}%</span>
      <span class="progress-toggle-icon">▾</span>
    </div>
    <div class="progress-content">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill" style="width:${avg}%"></div></div>
      <div class="progress-inputs">${inputs}</div>
    </div>
  </div>`;
}

/* ── [F1] KR Item with Accordion ── */
function renderKR(k){
  return `
  <div class="kr-wrap">
    <div class="kr-row">
      <div class="kr-num">${k.n}</div>
      <div class="kr-content">
        <div class="kr-text">${k.t}</div>
        <div class="kr-meta">
          <span class="target">${k.tgt}</span>
          ${badge(TP_CLASS[k.tp],TP_LABEL[k.tp])}
          ${badge(KT_CLASS[k.kt],KT_LABEL[k.kt])}
        </div>
      </div>
      <div class="kr-toggle">▾</div>
    </div>
    <div class="kr-accordion">
      <div class="kr-formula-box">
        <div class="kr-formula-title">📐 측정 공식</div>
        <div class="kr-formula-text">${k.fml}</div>
      </div>
      <div class="kr-bench-box">
        <div class="kr-bench-title">🌐 벤치마크</div>
        <div class="kr-bench-text">${k.bench}</div>
      </div>
    </div>
  </div>`;
}

/* ── Main Render ── */
function renderTab(key){
  const d = DATA[key];
  const statH = d.stats.map(s=>`
    <div class="stat">
      <div class="stat-val">${s.v}</div>
      <div class="stat-lbl">${s.l}</div>
    </div>`).join('');

  const okrH = d.okrs.map(o=>`
    <div class="okr-card">
      <div class="okr-head">
        <div class="o-badge" style="background:${o.bb};color:${o.bc}">${o.id}</div>
        <div class="okr-title">${o.title}</div>
        <div class="scroll-hint">↓ KPI</div>
      </div>
      <div class="okr-note">${o.note}</div>
      <div class="kr-list">${o.krs.map(renderKR).join('')}</div>
    </div>`).join('');

  const activeFilter = FILTER[key];
  const filterBtns = ['all','q','s','c'].map(f=>{
    const labels={all:'전체',q:'정량',s:'정성',c:'보완'};
    return `<button class="kpi-filter-btn${f===activeFilter?' active':''}" data-filter="${f}">${labels[f]}</button>`;
  }).join('');

  const kpiRows = d.kpis.map((k,i)=>{
    const hidden = (activeFilter !== 'all' && k.kt !== activeFilter) ? ' kpi-row-hidden' : '';
    return `<tr class="kpi-row-clickable${k.tp==='lead'?' r-lead':''}${hidden}" data-idx="${i}" data-kt="${k.kt}">
      <td>${k.nm}<span class="kpi-hint">▸</span></td>
      <td>${badge(TP_CLASS[k.tp],TP_LABEL[k.tp])}</td>
      <td>${badge(KT_CLASS[k.kt],KT_LABEL[k.kt])}</td>
      <td><strong>${k.tgt}</strong></td>
      <td><span class="cycle">${k.cy}</span></td>
    </tr>`;
  }).join('');

  const chalH = d.chal.map(c=>`
    <div class="ch-item">
      <div class="ch-icon">${c.ic}</div>
      <div><div class="ch-title">${c.ti}</div><div class="ch-desc">${c.de}</div></div>
    </div>`).join('');

  return `
  <div class="job-header">
    <div class="job-icon" style="background:${d.iconGrad}">${d.icon}</div>
    <div><div class="job-title">${d.title}</div><div class="job-sub">${d.sub}</div></div>
  </div>
  <div class="stats">${statH}</div>
  ${renderProgress(key)}
  <div class="sec-label">OKR — Objectives &amp; Key Results</div>
  <div class="okr-grid">${okrH}</div>
  <div class="sec-label">KPI 종합 지표표</div>
  <div class="card-tbl" id="kpi-section">
    <div class="card-tbl-head">📊 Leading · Lagging KPI 통합 요약 <span class="hint-txt">· 행 클릭 시 상세</span></div>
    <div class="kpi-filter-bar">${filterBtns}</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>KPI 항목</th><th>구분</th><th>유형</th><th>목표치</th><th>측정 주기</th>
        </tr></thead>
        <tbody id="kpi-tbody">${kpiRows}</tbody>
      </table>
    </div>
    <div class="legend">
      <div class="lg-item">${badge('b-lead','선행')}&nbsp;예측·행동</div>
      <div class="lg-item">${badge('b-lag','후행')}&nbsp;결과·성과</div>
      <div class="lg-item">${badge('b-q','정량')}&nbsp;수치 기반</div>
      <div class="lg-item">${badge('b-s','정성')}&nbsp;만족도·품질</div>
      <div class="lg-item">${badge('b-c','보완')}&nbsp;지원·활성화</div>
    </div>
  </div>
  <div class="sec-label">직무별 도전과제 (엔키아 특화)</div>
  <div class="card-ch">
    <div class="card-ch-head">⚠️ 실행 시 핵심 도전과제</div>
    <div class="ch-list">${chalH}</div>
  </div>`;
}

/* ── [F3] Modal ── */
function showModal(key, idx){
  const kpi = DATA[key].kpis[idx];
  document.getElementById('modal-title').textContent = kpi.nm;
  document.getElementById('modal-badges').innerHTML =
    badge(TP_CLASS[kpi.tp], TP_LABEL[kpi.tp]) + ' ' +
    badge(KT_CLASS[kpi.kt], KT_LABEL[kpi.kt]) + ' ' +
    `<span class="badge b-q" style="background:rgba(255,255,255,.06);color:#9eb3e8;border-color:rgba(255,255,255,.15)">목표: ${kpi.tgt}</span>` + ' ' +
    `<span class="badge b-lag" style="background:rgba(255,255,255,.04);color:#7a89b8;border-color:rgba(255,255,255,.1)">주기: ${kpi.cy}</span>`;
  document.getElementById('modal-fml').textContent = kpi.fml;
  document.getElementById('modal-bench').textContent = kpi.bench;
  document.getElementById('modal-howto').textContent = kpi.howto;
  document.getElementById('kpi-modal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('kpi-modal').style.display = 'none';
}

/* ── [F4] Update progress ── */
function updateProgress(key){
  const pr = PROGRESS[key];
  const avg = Math.round((pr.O1+pr.O2+pr.O3+pr.O4)/4);
  const fill = document.getElementById('progress-fill');
  const pct  = document.getElementById('progress-pct');
  if(fill) fill.style.width = avg + '%';
  if(pct)  pct.textContent = avg + '%';
  document.querySelectorAll('.prog-mini-fill').forEach((el,i)=>{
    const ok = ['O1','O2','O3','O4'][i];
    el.style.width = pr[ok] + '%';
  });
}

/* ── Event Handlers ── */
function attachHandlers(key){
  // [F1] KR accordion
  document.querySelectorAll('.kr-row').forEach(el=>{
    el.addEventListener('click', ()=> el.closest('.kr-wrap').classList.toggle('kr-open'));
  });

  // [F2] OKR head → scroll to KPI table
  document.querySelectorAll('.okr-head').forEach(el=>{
    el.addEventListener('click', ()=>{
      const kpiSection = document.getElementById('kpi-section');
      if(kpiSection) kpiSection.scrollIntoView({behavior:'smooth', block:'start'});
    });
  });

  // [F3] KPI row → modal
  document.querySelectorAll('.kpi-row-clickable').forEach(el=>{
    el.addEventListener('click', ()=> showModal(key, parseInt(el.dataset.idx)));
  });

  // [F4] Progress toggle + inputs
  document.getElementById('progress-header')?.addEventListener('click', ()=>{
    document.getElementById('progress-section')?.classList.toggle('open');
  });
  document.querySelectorAll('.progress-input').forEach(el=>{
    el.addEventListener('input', ()=>{
      const ok = el.dataset.ok;
      PROGRESS[key][ok] = Math.min(100, Math.max(0, parseInt(el.value)||0));
      updateProgress(key);
    });
  });

  // [F5] Filter buttons
  document.querySelectorAll('.kpi-filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const filter = btn.dataset.filter;
      FILTER[key] = filter;
      document.querySelectorAll('.kpi-filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.kpi-row-clickable').forEach(row=>{
        const show = filter==='all' || row.dataset.kt===filter;
        row.classList.toggle('kpi-row-hidden', !show);
      });
    });
  });
}

/* ── Tab Switching ── */
let cur = '영업';
function setTab(key){
  cur = key;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.tab===key);
  });
  document.getElementById('content').innerHTML = renderTab(key);
  attachHandlers(key);
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=> setTab(t.dataset.tab));
});

// Modal close handlers
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('kpi-modal').addEventListener('click', e=>{
  if(e.target === document.getElementById('kpi-modal')) closeModal();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// Timestamp
const now = new Date();
document.getElementById('ts').innerHTML =
  `<span class="dot"></span>${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 기준`;

setTab('영업');
</script>
</body>
</html>
